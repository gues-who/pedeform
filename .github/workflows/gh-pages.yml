name: Deploy — GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Next.js (static export)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web (static export)
        run: npm run build -w @pedeform/web
        env:
          GITHUB_ACTIONS: "true"
          # Sem NEXT_PUBLIC_API_URL: build não embute localhost; no Pages o host
          # não é localhost, então a API não é chamada (mock / erro amigável).
          NEXT_PUBLIC_WS_URL: "http://localhost:3001"

      - name: Add .nojekyll (evita que GitHub Pages ignore arquivos _next)
        run: touch apps/web/out/.nojekyll

      - name: Upload artifact para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy para GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
